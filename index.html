<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Library Portfolio</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="intro" class="intro-screen">
      <div class="intro-card">
        <p class="subtitle">Interactive 3D Portfolio</p>
        <h1 id="owner-name">김개발</h1>
        <p id="career">Frontend Developer · 5년차</p>
        <button id="enter-btn" class="primary-btn">문을 열고 입장하기</button>
      </div>
      <div class="door-wrap" aria-hidden="true">
        <div id="door-left" class="door left"></div>
        <div id="door-right" class="door right"></div>
      </div>
    </div>

    <main id="library-app" class="hidden">
      <canvas id="scene"></canvas>

      <section class="panel controls" aria-label="정렬 및 역할 선택">
        <h2>도서관 메뉴</h2>
        <label>
          역할
          <select id="role-select">
            <option value="visitor">이용자</option>
            <option value="librarian">사서</option>
          </select>
        </label>
        <label>
          정렬
          <select id="sort-select">
            <option value="time-desc">시간순 (최신)</option>
            <option value="time-asc">시간순 (오래된)</option>
            <option value="name-asc">이름순 (가나다)</option>
            <option value="name-desc">이름순 (역순)</option>
          </select>
        </label>
        <p class="hint">이동은 마우스/터치 드래그만 지원합니다.</p>
      </section>

      <section class="panel archive" aria-label="기록 목록">
        <div class="archive-head">
          <h2>기록 서가</h2>
          <button id="add-item-btn" class="secondary-btn hidden">기록 추가</button>
        </div>
        <ul id="records"></ul>
      </section>

      <dialog id="editor-dialog">
        <form id="editor-form" method="dialog">
          <h3 id="editor-title">기록 편집</h3>
          <input type="hidden" id="record-id" />
          <label>제목 <input id="record-title" required /></label>
          <label>설명 <textarea id="record-summary" rows="3" required></textarea></label>
          <label>분류 <input id="record-category" required /></label>
          <label>날짜 <input id="record-date" type="date" required /></label>
          <menu>
            <button value="cancel" type="reset">취소</button>
            <button value="default" type="submit">저장</button>
          </menu>
        </form>
      </dialog>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
